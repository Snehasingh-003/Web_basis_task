<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <h1>Expense Tracker</h1>

<div class="balance-box">
    <h2>Monthly Balance</h2>

    <input type="number" id="balanceInput" placeholder="Enter Monthly Balance">
    <button id="setBalanceBtn">Set Balance</button>

    <h3>Current Balance: Rupee  <span id="currentBalance">0</span></h3>
</div>

<hr>

<h2>Add Expense</h2>

<div class="expense-box">
    <input type="text" id="titleInput" placeholder="Expense Title">
    <input type="number" id="amountInput" placeholder="Amount">

    <select id="categoryInput">
        <option value="">Select Category</option>
        <option value="Food">Food</option>
        <option value="Electricity">Electricity</option>
        <option value="Shopping">Shopping</option>
        <option value="Travel">Travel</option>
    </select>

    <input type="date" id="dateInput">

    <button id="addTransactionBtn">Add Expense</button>
</div>


<hr>

<h2>Transaction History</h2>

<table border="1" width="80%" align="center" cellpadding="8" style="text-align:center;">
    <thead>
        <tr>
            <th>Title</th>
            <th>Amount</th>
            <th>Category</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="transactionTableBody">
        <!-- Data will come here -->
    </tbody>
</table>

    <script type="module" src="./dist/app.js"></script>
</body>
</html>
